<!doctype html>
<!-- Web shell for the wasm client.

     Build: crates/client/web/build.ps1 (sets the clang env imgui-sys needs
     on wasm, then cargo build + wasm-bindgen into web/pkg).
     Serve crates/client/web/ over plain HTTP (any static server) and run
     the game server normally — the client connects via WebSocket to the
     same host/ports it uses natively (the server sniffs WS upgrades on
     its TCP port). -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Jagex</title>
  <!-- OS_SERVER_INJECT -->
  <!-- The Pages deploy (pages.yml) replaces the line above with a script that
       defaults ?server= to the hosted game server, so the deployed client points
       at it without a query param. Left as a comment here, so local/dev builds
       keep targeting 127.0.0.1. An explicit ?server= in the URL always wins. -->
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #game { display: flex; height: 100%; align-items: center; justify-content: center; }
    #game canvas { width: 100vw; height: 100vh; outline: none; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module">
    // Dev cache-bust: python http.server sends no Cache-Control, so the
    // browser heuristically caches the module + wasm and serves STALE
    // builds after a rebuild. Re-fetch both every load (cheap on
    // localhost; drop the query for a real deployment + proper headers).
    const v = Date.now();
    const { default: init } = await import(`./pkg/client.js?v=${v}`);
    init(`./pkg/client_bg.wasm?v=${v}`);
  </script>
</body>
</html>
