name: CI

# Builds the whole OS project via build.ps1 (Rust client/server/panel/jaged +
# wasm bundle + Java client + IntelliJ plugin), runs the Rust test suite, and
# (on push/dispatch) deploys the wasm bundle build.ps1 produced to GitHub Pages.
# Windows runner because build.ps1 + the wasm build (LLVM, Git Bash) are Windows.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + test (windows)
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      # Skip the bulk of Content/ (~474M of model/map/config runtime data the build
      # never reads), but DO pull Content/scripts (.rs2 source, 41K) and
      # Content/pack (symbol packs, 2M): build.ps1 compiles those into data/pack via
      # :compiler:run, which engine's compiled_login test then loads. cache/ (~40M)
      # is checked out normally.
      - name: Checkout (sparse, skip bulk Content/)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/Content/*
            /Content/scripts/
            /Content/pack/
          sparse-checkout-cone-mode: false

      - name: Rust toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/jdks
            runescript/.intellijPlatform
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Ensure LLVM (imgui-sys compiles C++ for the wasm target)
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\Program Files\LLVM\bin\clang.exe')) {
            choco install llvm -y --no-progress
          }
          & 'C:\Program Files\LLVM\bin\clang.exe' --version

      - name: wasm-bindgen-cli (match Cargo.lock)
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE\_common.ps1"
          $want = Get-LockedCrateVersion 'wasm-bindgen'
          $have = ''
          if (Get-Command wasm-bindgen -ErrorAction SilentlyContinue) {
            $have = ((wasm-bindgen --version) -replace '[^0-9.]', '')
          }
          if ($have -ne $want) {
            Write-Host "installing wasm-bindgen-cli $want (have '$have')"
            cargo install wasm-bindgen-cli --version $want --locked
          } else {
            Write-Host "wasm-bindgen-cli $have already matches Cargo.lock"
          }

      - name: Build everything (build.ps1)
        shell: pwsh
        run: .\build.ps1

      # The heavy full-cache roundtrip tests live in the `cache` crate and run on
      # the parallel `cache-tests` (ubuntu) job, so skip them here. compiled_login
      # (engine) stays — it needs the data/pack build.ps1 just produced.
      - name: Test (cargo, excl cache)
        shell: pwsh
        run: cargo test --workspace --exclude cache --no-fail-fast

      # --- Pages (push/dispatch only) ---
      # build.ps1 already produced crates/client/web/pkg; point the deployed
      # client at the hosted server (override host with repo var OS_DEFAULT_SERVER;
      # a ?server= in the URL still wins), then upload the bundle.
      - name: Default client to the hosted server
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $server = "${{ vars.OS_DEFAULT_SERVER }}"
          if (-not $server) { $server = "game.idletree.net" }
          $inject = "<script>(function(){var sp=new URLSearchParams(location.search);if(!sp.has('server')){sp.set('server','$server');history.replaceState(null,'',location.pathname+'?'+sp.toString()+location.hash);}})();</script>"
          $idx = "crates/client/web/index.html"
          $html = Get-Content $idx -Raw
          if ($html -notmatch '<!-- OS_SERVER_INJECT -->') { throw "OS_SERVER_INJECT placeholder not found in $idx" }
          $html.Replace('<!-- OS_SERVER_INJECT -->', $inject) | Set-Content $idx -NoNewline -Encoding utf8
          Write-Host "deployed client defaults to server: $server"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/client/web

  cache-tests:
    name: cache roundtrips (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # The cache crate is pure Rust (no GUI/audio system deps) and its roundtrip
      # tests only read cache/ (tracked) — so they run fast here on Linux, in
      # parallel with the Windows build. No Content/ needed.
      - name: Checkout (sparse, skip Content/)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/Content/*
          sparse-checkout-cone-mode: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (cargo, cache crate)
        run: cargo test -p cache --no-fail-fast

  deploy:
    name: deploy to Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
