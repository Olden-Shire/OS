name: Deploy wasm client (Pages)

# Builds the wasm client bundle and publishes crates/client/web/ to GitHub Pages.
# The hosted (HTTPS) client connects to your server over wss:// via a ?server=
# override - see HOSTING.md. Enable Pages first: repo Settings -> Pages ->
# Build and deployment -> Source: "GitHub Actions".

on:
  push:
    branches: [master, main]
    paths:
      - 'crates/client/**'
      - 'crates/cache/**'
      - 'crates/io/**'
      - 'crates/protocol/**'
      - 'Cargo.lock'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build wasm bundle
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (sparse, skip Content/)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            /*
            !/Content/
          sparse-checkout-cone-mode: false

      - name: Rust toolchain (+ wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Ensure LLVM (imgui-sys compiles C++ for wasm)
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\Program Files\LLVM\bin\clang.exe')) {
            choco install llvm -y --no-progress
          }

      - name: wasm-bindgen-cli (match Cargo.lock)
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE\_common.ps1"
          $want = Get-LockedCrateVersion 'wasm-bindgen'
          $have = ''
          if (Get-Command wasm-bindgen -ErrorAction SilentlyContinue) {
            $have = ((wasm-bindgen --version) -replace '[^0-9.]', '')
          }
          if ($have -ne $want) { cargo install wasm-bindgen-cli --version $want --locked }

      - name: Build wasm bundle
        shell: pwsh
        run: .\crates\client\web\build.ps1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/client/web

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
